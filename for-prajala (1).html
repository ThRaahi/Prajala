<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lato:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 40% 30%, #1a0520 0%, #0d0212 50%, #050108 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      padding: 40px 20px 60px;
      font-family: 'Lato', sans-serif;
    }

    /* ── Header ───────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeDown 2s ease forwards;
    }
    .header h1 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(28px, 6vw, 52px);
      color: rgba(255, 180, 200, 0.9);
      text-shadow: 0 0 30px rgba(200, 80, 120, 0.6), 0 0 60px rgba(180, 60, 100, 0.3);
      letter-spacing: 0.05em;
    }
    .header p {
      font-size: clamp(12px, 2vw, 15px);
      color: rgba(200, 150, 170, 0.55);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 8px;
      font-style: italic;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Garden grid ──────────────────────────────────── */
    .garden {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 60px 50px;
      max-width: 900px;
      width: 100%;
    }

    /* ── Single rose wrapper ──────────────────────────── */
    .rose-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* ── The rose ─────────────────────────────────────── */
    .rose {
      position: relative;
      width: 120px;
      height: 120px;
      cursor: pointer;
      transition: filter .3s;
    }
    .rose:hover { filter: brightness(1.15); }

    /* petals */
    .petal {
      position: absolute;
      top: 50%; left: 50%;
      width: 50px;
      height: 70px;
      margin-left: -25px;
      margin-top: -55px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      transform-origin: bottom center;
      opacity: 0;
      transition: transform .9s cubic-bezier(.34,1.2,.64,1),
                  opacity  .7s ease;
    }

    /* colour layers */
    .petal:nth-child(-n+10) {
      background: radial-gradient(ellipse at 50% 30%, #ff6b8a, #c0254a);
      filter: drop-shadow(0 2px 6px rgba(200,30,70,.4));
    }
    .petal:nth-child(n+11):nth-child(-n+20) {
      background: radial-gradient(ellipse at 50% 30%, #ff8fa8, #d43060);
      width: 44px; height: 62px;
      margin-left: -22px; margin-top: -50px;
    }
    .petal:nth-child(n+21):nth-child(-n+28) {
      background: radial-gradient(ellipse at 50% 30%, #ffb3c4, #e05075);
      width: 36px; height: 50px;
      margin-left: -18px; margin-top: -42px;
    }
    .petal:nth-child(n+29) {
      background: radial-gradient(ellipse at 50% 60%, #ffd6e0, #f08090);
      width: 24px; height: 34px;
      margin-left: -12px; margin-top: -30px;
    }

    /* closed state: all petals folded up */
    .petal:nth-child(1)  { transform: rotate(0deg)   scaleY(0.25) scaleX(0.6); }
    .petal:nth-child(2)  { transform: rotate(36deg)  scaleY(0.25) scaleX(0.6); }
    .petal:nth-child(3)  { transform: rotate(72deg)  scaleY(0.25) scaleX(0.6); }
    .petal:nth-child(4)  { transform: rotate(108deg) scaleY(0.25) scaleX(0.6); }
    .petal:nth-child(5)  { transform: rotate(144deg) scaleY(0.25) scaleX(0.6); }
    .petal:nth-child(6)  { transform: rotate(180deg) scaleY(0.25) scaleX(0.6); }
    .petal:nth-child(7)  { transform: rotate(216deg) scaleY(0.25) scaleX(0.6); }
    .petal:nth-child(8)  { transform: rotate(252deg) scaleY(0.25) scaleX(0.6); }
    .petal:nth-child(9)  { transform: rotate(288deg) scaleY(0.25) scaleX(0.6); }
    .petal:nth-child(10) { transform: rotate(324deg) scaleY(0.25) scaleX(0.6); }

    .petal:nth-child(11) { transform: rotate(18deg)  scaleY(0.2) scaleX(0.55); }
    .petal:nth-child(12) { transform: rotate(54deg)  scaleY(0.2) scaleX(0.55); }
    .petal:nth-child(13) { transform: rotate(90deg)  scaleY(0.2) scaleX(0.55); }
    .petal:nth-child(14) { transform: rotate(126deg) scaleY(0.2) scaleX(0.55); }
    .petal:nth-child(15) { transform: rotate(162deg) scaleY(0.2) scaleX(0.55); }
    .petal:nth-child(16) { transform: rotate(198deg) scaleY(0.2) scaleX(0.55); }
    .petal:nth-child(17) { transform: rotate(234deg) scaleY(0.2) scaleX(0.55); }
    .petal:nth-child(18) { transform: rotate(270deg) scaleY(0.2) scaleX(0.55); }
    .petal:nth-child(19) { transform: rotate(306deg) scaleY(0.2) scaleX(0.55); }
    .petal:nth-child(20) { transform: rotate(342deg) scaleY(0.2) scaleX(0.55); }

    .petal:nth-child(21) { transform: rotate(12deg)  scaleY(0.15) scaleX(0.5); }
    .petal:nth-child(22) { transform: rotate(60deg)  scaleY(0.15) scaleX(0.5); }
    .petal:nth-child(23) { transform: rotate(108deg) scaleY(0.15) scaleX(0.5); }
    .petal:nth-child(24) { transform: rotate(156deg) scaleY(0.15) scaleX(0.5); }
    .petal:nth-child(25) { transform: rotate(204deg) scaleY(0.15) scaleX(0.5); }
    .petal:nth-child(26) { transform: rotate(252deg) scaleY(0.15) scaleX(0.5); }
    .petal:nth-child(27) { transform: rotate(300deg) scaleY(0.15) scaleX(0.5); }
    .petal:nth-child(28) { transform: rotate(348deg) scaleY(0.15) scaleX(0.5); }

    .petal:nth-child(29) { transform: rotate(30deg)  scaleY(0.1) scaleX(0.4); }
    .petal:nth-child(30) { transform: rotate(120deg) scaleY(0.1) scaleX(0.4); }
    .petal:nth-child(31) { transform: rotate(210deg) scaleY(0.1) scaleX(0.4); }
    .petal:nth-child(32) { transform: rotate(300deg) scaleY(0.1) scaleX(0.4); }

    /* ── OPEN state ──────────────────────────────────── */
    .rose.open .petal { opacity: 1; }

    .rose.open .petal:nth-child(1)  { transform: rotate(0deg)   scaleY(1) scaleX(1); }
    .rose.open .petal:nth-child(2)  { transform: rotate(36deg)  scaleY(1) scaleX(1); }
    .rose.open .petal:nth-child(3)  { transform: rotate(72deg)  scaleY(1) scaleX(1); }
    .rose.open .petal:nth-child(4)  { transform: rotate(108deg) scaleY(1) scaleX(1); }
    .rose.open .petal:nth-child(5)  { transform: rotate(144deg) scaleY(1) scaleX(1); }
    .rose.open .petal:nth-child(6)  { transform: rotate(180deg) scaleY(1) scaleX(1); }
    .rose.open .petal:nth-child(7)  { transform: rotate(216deg) scaleY(1) scaleX(1); }
    .rose.open .petal:nth-child(8)  { transform: rotate(252deg) scaleY(1) scaleX(1); }
    .rose.open .petal:nth-child(9)  { transform: rotate(288deg) scaleY(1) scaleX(1); }
    .rose.open .petal:nth-child(10) { transform: rotate(324deg) scaleY(1) scaleX(1); }

    .rose.open .petal:nth-child(11) { transform: rotate(18deg)  scaleY(0.9) scaleX(0.9); }
    .rose.open .petal:nth-child(12) { transform: rotate(54deg)  scaleY(0.9) scaleX(0.9); }
    .rose.open .petal:nth-child(13) { transform: rotate(90deg)  scaleY(0.9) scaleX(0.9); }
    .rose.open .petal:nth-child(14) { transform: rotate(126deg) scaleY(0.9) scaleX(0.9); }
    .rose.open .petal:nth-child(15) { transform: rotate(162deg) scaleY(0.9) scaleX(0.9); }
    .rose.open .petal:nth-child(16) { transform: rotate(198deg) scaleY(0.9) scaleX(0.9); }
    .rose.open .petal:nth-child(17) { transform: rotate(234deg) scaleY(0.9) scaleX(0.9); }
    .rose.open .petal:nth-child(18) { transform: rotate(270deg) scaleY(0.9) scaleX(0.9); }
    .rose.open .petal:nth-child(19) { transform: rotate(306deg) scaleY(0.9) scaleX(0.9); }
    .rose.open .petal:nth-child(20) { transform: rotate(342deg) scaleY(0.9) scaleX(0.9); }

    .rose.open .petal:nth-child(21) { transform: rotate(12deg)  scaleY(0.75) scaleX(0.8); }
    .rose.open .petal:nth-child(22) { transform: rotate(60deg)  scaleY(0.75) scaleX(0.8); }
    .rose.open .petal:nth-child(23) { transform: rotate(108deg) scaleY(0.75) scaleX(0.8); }
    .rose.open .petal:nth-child(24) { transform: rotate(156deg) scaleY(0.75) scaleX(0.8); }
    .rose.open .petal:nth-child(25) { transform: rotate(204deg) scaleY(0.75) scaleX(0.8); }
    .rose.open .petal:nth-child(26) { transform: rotate(252deg) scaleY(0.75) scaleX(0.8); }
    .rose.open .petal:nth-child(27) { transform: rotate(300deg) scaleY(0.75) scaleX(0.8); }
    .rose.open .petal:nth-child(28) { transform: rotate(348deg) scaleY(0.75) scaleX(0.8); }

    .rose.open .petal:nth-child(29) { transform: rotate(30deg)  scaleY(0.55) scaleX(0.65); }
    .rose.open .petal:nth-child(30) { transform: rotate(120deg) scaleY(0.55) scaleX(0.65); }
    .rose.open .petal:nth-child(31) { transform: rotate(210deg) scaleY(0.55) scaleX(0.65); }
    .rose.open .petal:nth-child(32) { transform: rotate(300deg) scaleY(0.55) scaleX(0.65); }

    /* glow pulse when open */
    .rose.open {
      animation: roseGlow 2.5s ease-in-out infinite alternate;
    }
    @keyframes roseGlow {
      from { filter: drop-shadow(0 0 8px rgba(220,60,100,.5)); }
      to   { filter: drop-shadow(0 0 22px rgba(255,100,140,.85)); }
    }

    /* ── Prompt text under each rose ─────────────────── */
    .prompt {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(200, 140, 160, 0.5);
      font-style: italic;
      transition: opacity .4s;
      user-select: none;
    }
    .rose.open ~ .prompt { opacity: 0; }

    /* ── Message card ─────────────────────────────────── */
    .msg {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(14px, 2.5vw, 18px);
      color: rgba(255, 210, 220, 0);
      text-align: center;
      line-height: 1.6;
      min-height: 56px;
      transition: color .8s ease .3s, text-shadow .8s ease .3s;
      text-shadow: none;
      max-width: 160px;
    }
    .msg.show {
      color: rgba(255, 210, 220, 0.95);
      text-shadow: 0 0 20px rgba(220, 80, 110, 0.55);
    }

    /* ── Falling petals bg ────────────────────────────── */
    .petal-fall {
      position: fixed;
      top: -20px;
      width: 10px; height: 14px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: radial-gradient(ellipse, #ff8fa8, #c02050);
      opacity: 0;
      pointer-events: none;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(0)    rotate(0deg)   translateX(0);   opacity: .6; }
      50%  { transform: translateY(50vh) rotate(180deg) translateX(30px); opacity: .4; }
      100% { transform: translateY(105vh) rotate(360deg) translateX(-20px); opacity: 0; }
    }

    /* ── Footer ───────────────────────────────────────── */
    .footer {
      margin-top: 60px;
      text-align: center;
      animation: fadeUp 2s ease 1s both;
    }
    .footer h2 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(20px, 4vw, 32px);
      color: rgba(255, 180, 200, 0.75);
      text-shadow: 0 0 20px rgba(200, 80, 120, 0.4);
    }
    .footer a {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: .18em;
      color: rgba(200, 140, 165, 0.5);
      text-decoration: none;
      text-transform: uppercase;
      transition: color .3s;
    }
    .footer a:hover { color: rgba(255,180,200,0.85); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* floating heart */
    .heart-float {
      position: fixed;
      font-size: 14px;
      pointer-events: none;
      animation: floatHeart 3s ease-out forwards;
      opacity: 0;
    }
    @keyframes floatHeart {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.6); }
    }
  </style>
</head>
<body>

<!-- Falling petals background -->
<script>
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal-fall';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    p.style.width  = (7 + Math.random() * 8) + 'px';
    p.style.height = (9 + Math.random() * 11) + 'px';
    p.style.opacity = (.2 + Math.random() * .35);
    document.body.appendChild(p);
  }
</script>

<div class="header">
  <h1>For You, Prajala ✨</h1>
  <p>touch each rose — it has something to say</p>
</div>

<div class="garden" id="garden"></div>

<div class="footer">
  <h2>From Rahi 😌✨</h2>
  <a href="https://instagram.com/tawhid_rahi" target="_blank">@tawhid_rahi</a>
</div>

<script>
const messages = [
  "You make me feel\nlike nobody else\nbefore. 🌹",
  "Thanks for\ntolerating me. 😅🤍",
  "Every moment\nwith you is special.",
  "You make my\nworld brighter. 🌸",
  "You're the good\npart of my day. 🥺",
  "You're my\npeace. 🤍",
  "You are\nspecial. ✨",
  "I love you. 💫",
  "I miss you. 🥺",
  "I want to\nmake you mine. 🌹",
  "You became\nmy habit. 🤍",
  "I love you\na lot. 💕",
];

function makePetals() {
  let html = '';
  for (let i = 0; i < 32; i++) html += '<div class="petal"></div>';
  return html;
}

function spawnHearts(x, y) {
  for (let i = 0; i < 5; i++) {
    const h = document.createElement('div');
    h.className = 'heart-float';
    h.textContent = ['❤️','💕','🌸','✨','💗'][i];
    h.style.left = (x - 20 + Math.random() * 40) + 'px';
    h.style.top  = (y - 10) + 'px';
    h.style.animationDelay = (i * 0.12) + 's';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 3200);
  }
}

const garden = document.getElementById('garden');

messages.forEach((msg, idx) => {
  const wrap = document.createElement('div');
  wrap.className = 'rose-wrap';

  const rose = document.createElement('div');
  rose.className = 'rose';
  rose.innerHTML = makePetals();

  const prompt = document.createElement('div');
  prompt.className = 'prompt';
  prompt.textContent = 'touch me';

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg';
  msgDiv.innerHTML = msg.replace(/\n/g, '<br>');

  rose.addEventListener('click', function(e) {
    const wasOpen = rose.classList.contains('open');
    rose.classList.toggle('open');
    if (!wasOpen) {
      msgDiv.classList.add('show');
      const rect = rose.getBoundingClientRect();
      spawnHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
    } else {
      msgDiv.classList.remove('show');
    }
  });

  wrap.appendChild(rose);
  wrap.appendChild(prompt);
  wrap.appendChild(msgDiv);
  garden.appendChild(wrap);
});
</script>

</body>
</html>
